<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Heroes — Añadí tu super | Programación II</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Karla&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/formularios.css" />
  </head>
  <body>
    <!--
      Plantilla guía — Completá el markup según el frame «Añadir» de Figma.
      Recordá: los tests automáticos sólo miran este archivo y css/formularios.css.
    -->
    <div class="page-shell">
      <div class="top-bar">Descuentos 20%</div>

      <header class="brand-header">
        <p class="brand-title">DC Heroes</p>
      </header>

      <nav class="main-nav" aria-label="Principal">
        <a href="#">Contacto</a>
        <a href="#">Registrarme</a>
        <a href="#">Ingresar</a>
      </nav>

      <main class="page-main">
  <section class="form-panel">
    <h1>Añadí tu super!</h1>
    <p>Agregá tu personaje favorito completando las opciones.</p>

    <form method="post" action="#" class="hero-form">
      <div class="form-content">
        <div class="form-left">
          <label for="nombre">*Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Nombre" required />
            

          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" name="fecha" />

          <label for="descripcion">Descripción</label>
          <textarea
            id="descripcion"
            name="descripcion"
            placeholder="Descripción"
          ></textarea>
        </div>

        <div class="form-right">
          <label for="especie">*Especie</label>
          <select id="especie" name="especie" required>
            <option value="">Especie</option>
            <option value="humano">Humano</option>
            <option value="metahumano">Metahumano</option>
            <option value="alien">Alien</option>
            <option value="unknown">Unknown</option>
          </select>

          <label for="foto">Agregar Foto</label>
          <input type="file" id="foto" name="foto" />

          <fieldset>
            <legend>Poderes</legend>

            <label>
              <input type="checkbox" name="poderes" value="volar" />
              Volar
            </label>

            <label>
              <input type="checkbox" name="poderes" value="superinteligencia" />
              Superinteligencia
            </label>

            <label>
              <input type="checkbox" name="poderes" value="vista-rayos-laser" />
              Vista de rayos láser
            </label>

            <label>
              <input type="checkbox" name="poderes" value="billetera-gorda" />
              Billetera gorda
            </label>
          </fieldset>

          <fieldset>
            <legend>Tipo de personaje</legend>

            <label>
              <input type="radio" name="tipo-personaje" value="heroe" />
              Héroe / Heroína
            </label>

            <label>
              <input type="radio" name="tipo-personaje" value="villano" />
              Villano / Villana
            </label>
          </fieldset>
        </div>
      </div>

      <button type="submit">Añadir</button>
    </form>
  </section>
</main>

      <footer class="site-footer">
        <p>Todos los derechos reservados - Karen Nicole Martinez</p>
        <a href="https://github.com/" class="footer-github">GitHub</a>
      </footer>
    </div>
  </body>
</html>
